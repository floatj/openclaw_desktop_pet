<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { overflow: hidden; background: transparent; width: 100%; height: 100%; }
    canvas { display: block; background: transparent; }

    /* Notification bubble */
    #notification-bubble {
      display: none;
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #333;
      padding: 12px 20px;
      border-radius: 16px;
      font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
      font-size: 15px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 1000;
      max-width: 280px;
      text-align: center;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }
    /* Context menu */
    .context-menu {
      position: fixed;
      z-index: 10000;
      display: none;
      background: rgba(26, 26, 46, 0.9);
      border: 1px solid #4A90D9;
      border-radius: 8px;
      overflow: hidden;
    }
    .context-menu .menu-item {
      padding: 8px 16px;
      color: white;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
    }
    .context-menu .menu-item:hover {
      background: #2B4A8C;
    }

    #notification-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #fff;
    }
  </style>
</head>
<body data-tauri-drag-region>
  <div id="notification-bubble"></div>
  <div id="context-menu" class="context-menu">
    <div class="menu-item" id="menu-toggle-roam">開始亂跑 🐇</div>
    <div class="menu-item" id="menu-toggle-weapon">切換武器 🗡️</div>
    <div class="menu-item" id="menu-emotion">切換表情 😐</div>
    <div class="menu-item" id="menu-test-notify">發送測試通知泡泡</div>
    <div class="menu-item" id="menu-debug-laptop">💻 觸發打字動作</div>
    <div class="menu-item" id="menu-quit">離開</div>
  </div>
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    // ── Scene (transparent background) ──
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0.4, 2.8, 6.8);
    camera.lookAt(0.4, 1.3, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x000000, 0);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    // ── Lighting ──
    scene.add(new THREE.AmbientLight(0xfff5ee, 0.7));

    const dirLight = new THREE.DirectionalLight(0xFFF8E7, 1.6);
    dirLight.position.set(4, 10, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0xFFD0E0, 0.5);
    rimLight.position.set(-3, 6, -4);
    scene.add(rimLight);

    // Small circular shadow on "ground"
    const shadowGeo = new THREE.CircleGeometry(0.6, 16);
    const shadowMat = new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0.15, depthWrite: false,
    });
    const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = 0.01;
    scene.add(shadowPlane);

    // ── Emotion System ──
    let currentEmotion = 'normal';
    let activeSkinCtx = null;
    let activeSkinCanvas = null;

    // Draw emotion-specific face features onto the HEAD-FRONT area (x:9-14, y:11-15)
    function drawFaceFeatures(ctx, emotion) {
      const SKIN = '#FFE0CC';
      const SKIN_SHADOW = '#F0D0B8';
      // Clear face feature area back to skin colour first
      ctx.fillStyle = SKIN;
      ctx.fillRect(9, 11, 6, 5);
      switch (emotion) {
        case 'normal':
        default:
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 12, 2, 2); ctx.fillRect(13, 12, 2, 2);
          ctx.fillStyle = '#6AB0E8'; ctx.fillRect(10, 12, 1, 1); ctx.fillRect(14, 12, 1, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 12, 1, 1); ctx.fillRect(13, 12, 1, 1);
          ctx.fillStyle = '#FFB0B0'; ctx.fillRect(9, 14, 2, 1); ctx.fillRect(14, 14, 1, 1);
          ctx.fillStyle = '#E88A8A'; ctx.fillRect(12, 15, 1, 1);
          ctx.fillStyle = SKIN_SHADOW; ctx.fillRect(12, 14, 1, 1);
          break;
        case 'happy':
          // Happy squinty eyes – top row darker (lashes)
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 12, 2, 2); ctx.fillRect(13, 12, 2, 2);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(10, 12, 2, 1); ctx.fillRect(13, 12, 2, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 13, 1, 1); ctx.fillRect(14, 13, 1, 1);
          ctx.fillStyle = '#FFB0B0'; ctx.fillRect(9, 14, 2, 1); ctx.fillRect(14, 14, 1, 1);
          // U-curve smile: corners at y:14, dip at y:15
          ctx.fillStyle = '#E88A8A'; ctx.fillRect(11, 14, 1, 1); ctx.fillRect(12, 15, 1, 1); ctx.fillRect(13, 14, 1, 1);
          break;
        case 'angry':
          // Wider 2px brows above inner corners → more visible angry brow
          ctx.fillStyle = '#3A2010'; ctx.fillRect(10, 11, 2, 1); ctx.fillRect(13, 11, 2, 1);
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 12, 2, 2); ctx.fillRect(13, 12, 2, 2);
          // Dark inner corner = furrow shadow
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 12, 1, 1); ctx.fillRect(13, 12, 1, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 12, 1, 1); ctx.fillRect(14, 12, 1, 1);
          // No blush; arch-frown: corners down (y:15), center up (y:14)
          ctx.fillStyle = '#A05050'; ctx.fillRect(11, 15, 1, 1); ctx.fillRect(12, 14, 1, 1); ctx.fillRect(13, 15, 1, 1);
          break;
        case 'sleepy':
          // Droopy eyelid covers top half of each eye
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 13, 2, 1); ctx.fillRect(13, 13, 2, 1);
          ctx.fillStyle = '#FFD0E0'; ctx.fillRect(10, 12, 2, 1); ctx.fillRect(13, 12, 2, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          // Tiny neutral mouth
          ctx.fillStyle = '#D09090'; ctx.fillRect(12, 15, 1, 1);
          break;
        case 'surprised':
          // Wide eyes – white on top visible
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 12, 2, 1); ctx.fillRect(13, 12, 2, 1);
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 13, 2, 1); ctx.fillRect(13, 13, 2, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          // Open-O mouth
          ctx.fillStyle = '#D06060'; ctx.fillRect(11, 15, 2, 1);
          break;
        case 'shy':
          // Normal eyes
          ctx.fillStyle = '#4A90D9'; ctx.fillRect(10, 12, 2, 2); ctx.fillRect(13, 12, 2, 2);
          ctx.fillStyle = '#6AB0E8'; ctx.fillRect(10, 12, 1, 1); ctx.fillRect(14, 12, 1, 1);
          ctx.fillStyle = '#1A3060'; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 12, 1, 1); ctx.fillRect(13, 12, 1, 1);
          // Extra-large blush that extends upward
          // Symmetric 2px cheeks at y:14; upper blush only on left (x:14,y:13 overlaps right eye)
          ctx.fillStyle = '#FF8080'; ctx.fillRect(9, 14, 2, 1); ctx.fillRect(13, 14, 2, 1);
          ctx.fillStyle = '#FFB0C0'; ctx.fillRect(9, 13, 1, 1);
          // Small smile
          ctx.fillStyle = '#E88A8A'; ctx.fillRect(12, 15, 1, 1);
          ctx.fillStyle = SKIN_SHADOW; ctx.fillRect(12, 14, 1, 1);
          break;
        case 'focused':
          // 微皺眉（淡棕色，比 angry 溫和）
          ctx.fillStyle = "#8B7060"; ctx.fillRect(10, 11, 2, 1); ctx.fillRect(13, 11, 2, 1);
          // 眼睛底色
          ctx.fillStyle = "#4A90D9"; ctx.fillRect(10, 12, 2, 2); ctx.fillRect(13, 12, 2, 2);
          // 瞇眼：膚色蓋住上眼瞼
          ctx.fillStyle = "#F0D0B8"; ctx.fillRect(10, 12, 2, 1); ctx.fillRect(13, 12, 2, 1);
          // 瞳孔
          ctx.fillStyle = "#1A3060"; ctx.fillRect(11, 13, 1, 1); ctx.fillRect(13, 13, 1, 1);
          // 一字嘴（專注）
          ctx.fillStyle = "#D09090"; ctx.fillRect(11, 15, 2, 1);
          break;
      }
    }

    // Update the live skin canvas and flag the texture for re-upload
    function setEmotion(emotion) {
      currentEmotion = emotion;
      if (!activeSkinCtx) return;
      drawFaceFeatures(activeSkinCtx, emotion);
      if (avatarMaterial && avatarMaterial.map) avatarMaterial.map.needsUpdate = true;
    }

    // ── Skin Texture ──
    function createSkinTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#0A0A1A';
      ctx.fillRect(0, 0, 64, 64);

      const SKIN = '#FFE0CC', SKIN_SHADOW = '#F0D0B8';
      const HAIR = '#8EB8D4', HAIR_DARK = '#6A9AB8', HAIR_LIGHT = '#B8D8EE';
      const DRESS = '#2B4A8C', DRESS_LIGHT = '#3B5FA0', DRESS_DARK = '#1E3566';
      const APRON = '#FFFFFF', APRON_SHADOW = '#E8E8F0';
      const BOW = '#4A90D9';

      // HEAD - FRONT
      ctx.fillStyle = SKIN; ctx.fillRect(8, 8, 8, 8);
      // Bangs
      ctx.fillStyle = HAIR; ctx.fillRect(8, 8, 8, 3);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 8, 8, 1);
      // Maid headband (white frilly)
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(8, 8, 8, 1);
      ctx.fillStyle = '#E0E8F0'; ctx.fillRect(9, 8, 1, 1); ctx.fillRect(11, 8, 1, 1); ctx.fillRect(13, 8, 1, 1);
      // Hair below headband
      ctx.fillStyle = HAIR; ctx.fillRect(8, 9, 8, 2);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(9, 9, 2, 1); ctx.fillRect(13, 9, 2, 1);
      // Side hair framing face
      ctx.fillStyle = HAIR; ctx.fillRect(8, 11, 1, 5); ctx.fillRect(15, 11, 1, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 14, 1, 2); ctx.fillRect(15, 14, 1, 2);
      // Face features (emotion-driven) – store canvas ref for live updates
      activeSkinCanvas = canvas;
      activeSkinCtx = ctx;
      drawFaceFeatures(ctx, currentEmotion);

      // HEAD - RIGHT
      ctx.fillStyle = SKIN; ctx.fillRect(0, 8, 8, 8);
      ctx.fillStyle = SKIN_SHADOW; ctx.fillRect(0, 8, 2, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 8, 8, 1); // headband
      ctx.fillStyle = HAIR; ctx.fillRect(0, 9, 8, 2);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(0, 9, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(0, 11, 4, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(0, 14, 3, 2);

      // HEAD - LEFT
      ctx.fillStyle = SKIN; ctx.fillRect(16, 8, 8, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(16, 8, 8, 1); // headband
      ctx.fillStyle = HAIR; ctx.fillRect(16, 9, 8, 2);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(16, 9, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(20, 11, 4, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(21, 14, 3, 2);

      // HEAD - BACK
      ctx.fillStyle = HAIR; ctx.fillRect(24, 8, 8, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(24, 8, 8, 1); // headband
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(24, 9, 8, 1);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(26, 10, 2, 1); ctx.fillRect(28, 12, 2, 1);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(24, 14, 8, 2);

      // HEAD - TOP (hair + headband)
      ctx.fillStyle = HAIR; ctx.fillRect(8, 0, 8, 8);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 0, 8, 2);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(10, 3, 2, 2); ctx.fillRect(13, 2, 2, 2);
      // Headband frills on top
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 6, 4, 2);
      ctx.fillStyle = '#E0E8F0'; ctx.fillRect(11, 7, 2, 1);

      // HEAD - BOTTOM
      ctx.fillStyle = SKIN; ctx.fillRect(16, 0, 8, 8);

      // BODY - FRONT (blue maid dress + white apron)
      ctx.fillStyle = DRESS; ctx.fillRect(20, 20, 8, 12);
      // White collar
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(21, 20, 6, 1);
      ctx.fillStyle = '#F0F0F0'; ctx.fillRect(20, 20, 1, 1); ctx.fillRect(27, 20, 1, 1);
      // Blue bow at neck
      ctx.fillStyle = BOW; ctx.fillRect(23, 21, 2, 1);
      ctx.fillStyle = '#3A7BC8'; ctx.fillRect(22, 22, 1, 1); ctx.fillRect(25, 22, 1, 1);
      ctx.fillStyle = BOW; ctx.fillRect(23, 22, 2, 1);
      // Pleat shadows
      ctx.fillStyle = DRESS_DARK;
      ctx.fillRect(20, 25, 1, 7); ctx.fillRect(23, 26, 1, 6); ctx.fillRect(27, 25, 1, 7);
      // Pleat highlights
      ctx.fillStyle = DRESS_LIGHT;
      ctx.fillRect(21, 26, 1, 5); ctx.fillRect(24, 26, 1, 5);
      // White apron (narrow center - 2px)
      ctx.fillStyle = APRON; ctx.fillRect(23, 23, 2, 8);
      ctx.fillStyle = APRON_SHADOW; ctx.fillRect(23, 23, 2, 1);
      // White trim at bottom
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(20, 31, 8, 1);

      // BODY sides
      ctx.fillStyle = DRESS; ctx.fillRect(16, 20, 4, 12);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(16, 20, 4, 1); // collar
      ctx.fillStyle = DRESS_DARK; ctx.fillRect(16, 24, 1, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(16, 31, 4, 1);
      ctx.fillStyle = DRESS; ctx.fillRect(28, 20, 4, 12);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(28, 20, 4, 1);
      ctx.fillStyle = DRESS_DARK; ctx.fillRect(31, 24, 1, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(28, 31, 4, 1);

      // BODY - BACK (dress + apron bow)
      ctx.fillStyle = DRESS; ctx.fillRect(32, 20, 8, 12);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(32, 20, 8, 1); // collar back
      // Big apron bow on back
      ctx.fillStyle = APRON; ctx.fillRect(34, 22, 4, 2);
      ctx.fillStyle = '#F0F0F0'; ctx.fillRect(35, 22, 2, 2);
      // Apron ties
      ctx.fillStyle = APRON; ctx.fillRect(34, 24, 1, 3); ctx.fillRect(37, 24, 1, 3);
      ctx.fillStyle = DRESS_DARK; ctx.fillRect(32, 25, 2, 7); ctx.fillRect(38, 25, 2, 7);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(32, 31, 8, 1);

      // BODY top/bottom
      ctx.fillStyle = DRESS; ctx.fillRect(20, 16, 8, 4);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(22, 16, 4, 2); // collar top
      ctx.fillStyle = DRESS; ctx.fillRect(28, 16, 8, 4);

      // RIGHT ARM (blue sleeve + white glove)
      ctx.fillStyle = DRESS; ctx.fillRect(44, 20, 4, 6);
      ctx.fillStyle = DRESS_LIGHT; ctx.fillRect(44, 20, 4, 1); // shoulder highlight
      ctx.fillStyle = DRESS_DARK; ctx.fillRect(44, 25, 4, 1); // cuff
      // White glove
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(44, 26, 4, 6);
      ctx.fillStyle = '#E8E8F0'; ctx.fillRect(44, 26, 4, 1); // glove top

      // LEFT ARM
      ctx.fillStyle = DRESS; ctx.fillRect(36, 52, 4, 6);
      ctx.fillStyle = DRESS_LIGHT; ctx.fillRect(36, 52, 4, 1);
      ctx.fillStyle = DRESS_DARK; ctx.fillRect(36, 57, 4, 1);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(36, 58, 4, 6);
      ctx.fillStyle = '#E8E8F0'; ctx.fillRect(36, 58, 4, 1);

      // RIGHT LEG (white stocking + blue shoe)
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(4, 20, 4, 8);
      ctx.fillStyle = '#F0F0F8'; ctx.fillRect(4, 20, 4, 1);
      // Blue shoe
      ctx.fillStyle = DRESS; ctx.fillRect(4, 28, 4, 4);
      ctx.fillStyle = DRESS_LIGHT; ctx.fillRect(5, 28, 2, 1);
      // Shoe bow
      ctx.fillStyle = BOW; ctx.fillRect(5, 29, 2, 1);

      // LEFT LEG
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(20, 52, 4, 8);
      ctx.fillStyle = '#F0F0F8'; ctx.fillRect(20, 52, 4, 1);
      ctx.fillStyle = DRESS; ctx.fillRect(20, 60, 4, 4);
      ctx.fillStyle = DRESS_LIGHT; ctx.fillRect(21, 60, 2, 1);
      ctx.fillStyle = BOW; ctx.fillRect(21, 61, 2, 1);

      const texture = new THREE.CanvasTexture(canvas);
      texture.magFilter = THREE.NearestFilter;
      texture.minFilter = THREE.NearestFilter;
      return texture;
    }

    // ── Dark Skin Texture ──
    function createDarkSkinTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#0A0A1A';
      ctx.fillRect(0, 0, 64, 64);

      const SKIN = '#FFE0CC', SKIN_SHADOW = '#F0D0B8';
      const HAIR = '#8EB8D4', HAIR_DARK = '#6A9AB8', HAIR_LIGHT = '#B8D8EE';
      const DRESS = '#1A1A2E', DRESS_LIGHT = '#2A2A3E', DRESS_DARK = '#0A0A1A';
      const APRON = '#3A3A4A', APRON_SHADOW = '#2E2E3A';
      const BOW = '#6B3FA0';

      // HEAD - FRONT
      ctx.fillStyle = SKIN; ctx.fillRect(8, 8, 8, 8);
      ctx.fillStyle = HAIR; ctx.fillRect(8, 8, 8, 3);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 8, 8, 1);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(8, 8, 8, 1);
      ctx.fillStyle = '#E0E8F0'; ctx.fillRect(9, 8, 1, 1); ctx.fillRect(11, 8, 1, 1); ctx.fillRect(13, 8, 1, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(8, 9, 8, 2);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(9, 9, 2, 1); ctx.fillRect(13, 9, 2, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(8, 11, 1, 5); ctx.fillRect(15, 11, 1, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 14, 1, 2); ctx.fillRect(15, 14, 1, 2);
      // Face features (emotion-driven) – store canvas ref for live updates
      activeSkinCanvas = canvas;
      activeSkinCtx = ctx;
      drawFaceFeatures(ctx, currentEmotion);

      // HEAD - RIGHT
      ctx.fillStyle = SKIN; ctx.fillRect(0, 8, 8, 8);
      ctx.fillStyle = SKIN_SHADOW; ctx.fillRect(0, 8, 2, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 8, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(0, 9, 8, 2);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(0, 9, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(0, 11, 4, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(0, 14, 3, 2);

      // HEAD - LEFT
      ctx.fillStyle = SKIN; ctx.fillRect(16, 8, 8, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(16, 8, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(16, 9, 8, 2);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(16, 9, 8, 1);
      ctx.fillStyle = HAIR; ctx.fillRect(20, 11, 4, 5);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(21, 14, 3, 2);

      // HEAD - BACK
      ctx.fillStyle = HAIR; ctx.fillRect(24, 8, 8, 8);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(24, 8, 8, 1);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(24, 9, 8, 1);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(26, 10, 2, 1); ctx.fillRect(28, 12, 2, 1);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(24, 14, 8, 2);

      // HEAD - TOP
      ctx.fillStyle = HAIR; ctx.fillRect(8, 0, 8, 8);
      ctx.fillStyle = HAIR_DARK; ctx.fillRect(8, 0, 8, 2);
      ctx.fillStyle = HAIR_LIGHT; ctx.fillRect(10, 3, 2, 2); ctx.fillRect(13, 2, 2, 2);
      ctx.fillStyle = '#FFFFFF'; ctx.fillRect(10, 6, 4, 2);
      ctx.fillStyle = '#E0E8F0'; ctx.fillRect(11, 7, 2, 1);

      // HEAD - BOTTOM
      ctx.fillStyle = SKIN; ctx.fillRect(16, 0, 8, 8);

      // BODY - FRONT
      ctx.fillStyle = DRESS; ctx.fillRect(20, 20, 8, 12);
      ctx.fillStyle = '#CCCCCC'; ctx.fillRect(21, 20, 6, 1);
      ctx.fillStyle = '#BBBBBB'; ctx.fillRect(20, 20, 1, 1); ctx.fillRect(27, 20, 1, 1);
      ctx.fillStyle = BOW; ctx.fillRect(23, 21, 2, 1);
      ctx.fillStyle = '#5A2F90'; ctx.fillRect(22, 22, 1, 1); ctx.fillRect(25, 22, 1, 1);
      ctx.fillStyle = BOW; ctx.fillRect(23, 22, 2, 1);
      ctx.fillStyle = DRESS_DARK;
      ctx.fillRect(20, 25, 1, 7); ctx.fillRect(23, 26, 1, 6); ctx.fillRect(27, 25, 1, 7);
      ctx.fillStyle = DRESS_LIGHT;

    // ── Build Character ──
    function createMinecraftAvatar() {
      const avatar = new THREE.Group();
      const skinTexture = createSkinTexture();

      function createBoxWithUV(w, h, d, uvMapping) {
        const geometry = new THREE.BoxGeometry(w, h, d);
        const uvAttr = geometry.attributes.uv;
        const faces = ['right', 'left', 'top', 'bottom', 'front', 'back'];
        for (let i = 0; i < faces.length; i++) {
          const face = uvMapping[faces[i]] || { x: 0, y: 0, w: 8, h: 8 };
          const u0 = face.x / 64, v0 = 1 - (face.y + face.h) / 64;
          const u1 = (face.x + face.w) / 64, v1 = 1 - face.y / 64;
          const idx = i * 4;
          uvAttr.setXY(idx, u0, v1); uvAttr.setXY(idx+1, u1, v1);
          uvAttr.setXY(idx+2, u0, v0); uvAttr.setXY(idx+3, u1, v0);
        }
        uvAttr.needsUpdate = true;
        return geometry;
      }

      const material = new THREE.MeshStandardMaterial({ map: skinTexture, roughness: 0.8, metalness: 0 });
      const earOuterMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.6 });
      const earInnerMat = new THREE.MeshStandardMaterial({ color: 0xFFB0B8, roughness: 0.5 });
      const hairMat = new THREE.MeshStandardMaterial({ color: 0x8EB8D4, roughness: 0.7 });
      const hairDarkMat = new THREE.MeshStandardMaterial({ color: 0x6A9AB8, roughness: 0.7 });

      const headGroup = new THREE.Group();

      const rightEar = createEar(-0.28, 0.12);

        const c = new THREE.Mesh(new THREE.BoxGeometry(0.25,0.4,0.2), hairMat); c.position.set(0,-0.9,0.05); t.add(c);
        t.position.set(x, -0.1, -0.5); t.rotation.x = 0.15;

      const twinTailL = makeTail(-0.35);

        const pivot = new THREE.Group();
        pivot.position.set(xPos, 0, 0);
        const mesh = new THREE.Mesh(geo, material);
        mesh.position.y = -0.75; mesh.castShadow = true;
        pivot.add(mesh);
        return pivot;
      }
      avatar.rightLeg = makeLeg(4,20,4,29,3,-0.25); avatar.add(avatar.rightLeg);
      avatar.leftLeg = makeLeg(20,52,20,61,3,0.25); avatar.add(avatar.leftLeg);

    // ── 3D NZXT Logo ──
    function createNZXTLogo() {
      const group = new THREE.Group();

      // Create canvas texture matching NZXT brand: white bold text on purple bg
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 192;
      const ctx = canvas.getContext('2d');

      // Purple rounded rectangle background
      const rx = 20, bgX = 32, bgY = 16, bgW = 448, bgH = 160;
      ctx.beginPath();
      ctx.moveTo(bgX + rx, bgY);
      ctx.lineTo(bgX + bgW - rx, bgY);
      ctx.quadraticCurveTo(bgX + bgW, bgY, bgX + bgW, bgY + rx);
      ctx.lineTo(bgX + bgW, bgY + bgH - rx);
      ctx.quadraticCurveTo(bgX + bgW, bgY + bgH, bgX + bgW - rx, bgY + bgH);
      ctx.lineTo(bgX + rx, bgY + bgH);
      ctx.quadraticCurveTo(bgX, bgY + bgH, bgX, bgY + bgH - rx);
      ctx.lineTo(bgX, bgY + rx);
      ctx.quadraticCurveTo(bgX, bgY, bgX + rx, bgY);
      ctx.closePath();
      ctx.fillStyle = '#3B0764';
      ctx.fill();

      // White bold "NZXT" text — use heaviest available font
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '900 110px "Arial Black", "Impact", "Helvetica Neue", Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.letterSpacing = '6px';
      ctx.fillText('NZXT', 256, 100);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      // Front face plane
      const frontMat = new THREE.MeshBasicMaterial({
        map: texture, transparent: true, opacity: 0, depthWrite: false,
      });
      const aspect = canvas.width / canvas.height;
      const frontPlane = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 2.8 / aspect), frontMat);
      frontPlane.position.z = 0.08;
      group.add(frontPlane);

      // 3D extrusion behind (slightly smaller, dark purple)
      const sideMat = new THREE.MeshStandardMaterial({
        color: 0x2A0550, transparent: true, opacity: 0,
      });
      const sideBox = new THREE.Mesh(new THREE.BoxGeometry(2.8, 2.8 / aspect, 0.15), sideMat);
      group.add(sideBox);

      // Soft glow behind logo
      const glowCanvas = document.createElement('canvas');
      glowCanvas.width = 256;
      glowCanvas.height = 128;
      const gctx = glowCanvas.getContext('2d');
      const grad = gctx.createRadialGradient(128, 64, 10, 128, 64, 128);
      grad.addColorStop(0, 'rgba(80, 40, 160, 0.5)');
      grad.addColorStop(0.6, 'rgba(60, 20, 120, 0.2)');
      grad.addColorStop(1, 'rgba(60, 20, 120, 0)');
      gctx.fillStyle = grad;
      gctx.fillRect(0, 0, 256, 128);
      const glowTexture = new THREE.CanvasTexture(glowCanvas);
      const glowMat = new THREE.MeshBasicMaterial({

    // ── Laptop (typing prop) ──
    function createLaptop() {

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4A4A68, roughness: 0.5, metalness: 0.1, emissive: 0x15152A, emissiveIntensity: 0.6 });

      const lidGroup = new THREE.Group();
      lidGroup.position.set(0, 0.025, -0.275); // hinge point
      lidGroup.rotation.x = -0.44;             // ~116° open: screen visible, tilted back naturally

      // Lid outer shell

      lidBody.position.set(0, 0.32, 0);

      // Screen bezel

      bezel.position.set(0, 0.32, 0.026);

      // Screen panel (emissive)
      const screen = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.49, 0.010), screenMat);
      screen.position.set(0, 0.32, 0.033);
      lidGroup.add(screen);

      // Screen glow halo
      const screenGlow = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.55, 0.004), screenGlowMat);
      screenGlow.position.set(0, 0.32, 0.039);
      lidGroup.add(screenGlow);

      // Soft blue point light from screen (boosted)
      const screenLight = new THREE.PointLight(0x5590FF, 1.2, 3.5);
      screenLight.position.set(0, 0.32, 0.15);
      lidGroup.add(screenLight);

      // Fill light on keyboard side (local +z = world -z after Y-flip, facing character)
      // keeps keyboard/body visible regardless of scene directional light angle
      const fillLight = new THREE.PointLight(0xC8C8FF, 0.9, 2.5);
      fillLight.position.set(0, 0.5, 0.5);
      group.add(fillLight);

      group.add(lidGroup);

      group.visible = false;
      return group;
    }

    const laptop = createLaptop();

    holeRim.visible = false;

    // ── Pet AI: random idle actions ──
    let animTime = 0;
    let currentAction = 'idle';
    let actionTimer = 0;
    let nextActionDelay = 3 + Math.random() * 4;
    let spinAngle = 0;
    let bounceVel = 0;
    let bounceY = 0;
    let lastActionForEmotion = null;

    // ── Random Chat Bubble System ──
    const randomLines = [
      '大小姐加油！💪',

    ];
    let randomBubbleTimer = 30 + Math.random() * 30;
    let timeNotifyTimer = 10 + Math.random() * 20; // first time-check after 10-30s

    const actions = ['idle', 'wave', 'jump', 'spin', 'look', 'dance', 'sit', 'sleep', 'run', 'stretch', 'sneeze', 'nod', 'eat', 'typing'];
    // Weights: idle/sit/sleep last longer, active ones shorter
    const actionDurations = {
      idle: [3, 5], wave: [2, 3], jump: [1, 1], spin: [2, 3], look: [2, 4],
      dance: [3, 5], sit: [4, 7], sleep: [5, 8], run: [2, 4], stretch: [2, 3],
      sneeze: [1.5, 2], nod: [2, 3], eat: [3, 5], headpat: [2, 2],
      typing: [5, 10],
    };

    function pickNextAction() {
      const prev = currentAction;
      const h = new Date().getHours();

      // Time-of-day action weights
      let weights;
      if (h >= 2 && h < 6) {
        // Deep night: almost always sleeping
        weights = { idle: 1, sleep: 10, sit: 3, stretch: 1 };
      } else if (h >= 23 || h < 2) {
        // Late night: frequent sleep
        weights = { idle: 2, wave: 1, look: 1, sit: 3, sleep: 6, stretch: 1, nod: 1, typing: 1 };
      } else if (h >= 6 && h < 9) {
        // Morning: stretching, waving, cheerful
        weights = { idle: 2, wave: 3, jump: 2, stretch: 4, look: 2, nod: 2, run: 1, dance: 1, sit: 1, sneeze: 1, typing: 1 };
      } else if (h >= 9 && h < 12) {
        // Active morning: lots of movement
        weights = { idle: 1, wave: 3, jump: 3, run: 3, dance: 2, spin: 2, look: 1, nod: 2, stretch: 1, eat: 1, sneeze: 1, typing: 4 };
      } else if (h >= 12 && h < 13) {
        // Lunch: frequent eating
        weights = { idle: 2, eat: 6, sit: 3, nod: 2, wave: 1, look: 1 };
      } else if (h >= 13 && h < 17) {
        // Afternoon: normal balanced mix
        weights = { idle: 2, wave: 1, jump: 1, spin: 1, look: 2, dance: 1, sit: 2, run: 1, stretch: 1, sneeze: 1, nod: 1, eat: 1, typing: 4 };
      } else if (h >= 17 && h < 19) {
        // Evening: lazy stretching
        weights = { idle: 2, stretch: 4, sit: 3, look: 2, wave: 2, nod: 1, dance: 1, sleep: 1, sneeze: 1, typing: 2 };
      } else {
        // Night 19-23: normal with slight sleepiness
        weights = { idle: 2, wave: 2, look: 2, sit: 3, sleep: 2, dance: 2, nod: 1, stretch: 2, jump: 1, spin: 1, eat: 1, sneeze: 1, typing: 2 };
      }

      // Build weighted pool and exclude previous action
      const pool = [];
      for (const [action, w] of Object.entries(weights)) {
        for (let i = 0; i < w; i++) pool.push(action);
      }
      const filtered = pool.filter(a => a !== prev);
      const from = filtered.length > 0 ? filtered : pool;
      currentAction = from[Math.floor(Math.random() * from.length)];

      actionTimer = 0;
      const dur = actionDurations[currentAction] || [2, 4];
      nextActionDelay = dur[0] + Math.random() * (dur[1] - dur[0]);
    }

    // Double-click triggers a random action
    document.addEventListener('dblclick', () => { if (!isQuitting && !isStarting) pickNextAction(); });

    // Drag window on mousedown (canvas covers drag region, so use Tauri API directly)
    let isDragging = false;
    document.addEventListener('mousedown', (e) => {
      if (e.button === 0 && window.__TAURI__) {
        isDragging = true;
        window.__TAURI__.window.getCurrentWindow().startDragging();
      }
    });
    document.addEventListener('mouseup', async () => {
      isDragging = false;
      // Sync roam position after user drag
      if (isRoaming && roamInited && window.__TAURI__) {
        const win = window.__TAURI__.window.getCurrentWindow();
        const pos = await win.outerPosition();
        const sf = await win.scaleFactor();
        roamCurrentX = pos.x / sf;
        roamCurrentY = pos.y / sf;
      }
    });

    // Right-click context menu
    const contextMenu = document.getElementById('context-menu');
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      contextMenu.style.left = e.clientX + 'px';
      contextMenu.style.top = e.clientY + 'px';
      contextMenu.style.display = 'block';
    });
    // ── Roaming (move window around screen) ──
    let isRoaming = false;
    let roamTargetX = 0, roamTargetY = 0;
    let roamCurrentX = 0, roamCurrentY = 0;
    let roamScreenW = 1920, roamScreenH = 1080;
    let roamWinW = 300, roamWinH = 400;
    let roamInited = false;
    let roamPickTimer = 0;

    async function initRoam() {
      if (!window.__TAURI__) return;
      const win = window.__TAURI__.window.getCurrentWindow();
      try {
        const monitors = await window.__TAURI__.window.availableMonitors();
        if (monitors.length > 0) {
          const m = monitors[0];
          roamScreenW = m.size.width / m.scaleFactor;
          roamScreenH = m.size.height / m.scaleFactor;
        }
        const size = await win.innerSize();
        const scaleFactor = await win.scaleFactor();
        roamWinW = size.width / scaleFactor;
        roamWinH = size.height / scaleFactor;
        const pos = await win.outerPosition();
        roamCurrentX = pos.x / scaleFactor;
        roamCurrentY = pos.y / scaleFactor;
        roamTargetX = roamCurrentX;
        roamTargetY = roamCurrentY;
        roamInited = true;
      } catch(e) { console.warn('roam init failed', e); }
    }

    function pickRoamTarget() {
      const margin = 20;
      roamTargetX = margin + Math.random() * (roamScreenW - roamWinW - margin * 2);
      roamTargetY = margin + Math.random() * (roamScreenH - roamWinH - margin * 2);
    }

    let roamSpeed = 0; // current speed (pixels/sec)
    const roamMaxSpeed = 500;
    const roamAccel = 600;  // acceleration
    const roamDecel = 400;  // deceleration zone

    async function updateRoam(delta) {
      if (!isRoaming || !roamInited || !window.__TAURI__) return;
      roamPickTimer -= delta;
      if (roamPickTimer <= 0) {
        pickRoamTarget();
        roamPickTimer = 3 + Math.random() * 4;
      }
      const dx = roamTargetX - roamCurrentX;
      const dy = roamTargetY - roamCurrentY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 2) {
        // Decelerate when close to target, accelerate otherwise
        const decelDist = (roamSpeed * roamSpeed) / (2 * roamDecel);
        if (dist <= decelDist) {
          roamSpeed = Math.max(roamSpeed - roamDecel * delta, 30);
        } else {
          roamSpeed = Math.min(roamSpeed + roamAccel * delta, roamMaxSpeed);
        }
        const step = Math.min(roamSpeed * delta, dist);
        roamCurrentX += (dx / dist) * step;
        roamCurrentY += (dy / dist) * step;
        const win = window.__TAURI__.window.getCurrentWindow();
        const scaleFactor = await win.scaleFactor();
        await win.setPosition(new window.__TAURI__.window.PhysicalPosition(
          Math.round(roamCurrentX * scaleFactor),
          Math.round(roamCurrentY * scaleFactor)
        ));
      } else {
        roamSpeed = 0; // stopped at target, will accelerate to next
      }
    }

    const roamMenuEl = document.getElementById('menu-toggle-roam');
    roamMenuEl.addEventListener('click', async () => {
      isRoaming = !isRoaming;
      roamMenuEl.textContent = isRoaming ? '停止亂跑 🐇' : '開始亂跑 🐇';
      if (isRoaming) {
        await initRoam();
        roamPickTimer = 0; // pick target immediately
        currentAction = 'run';
        actionTimer = 0;
        nextActionDelay = 999;
        showNotification('兔兔開始亂跑！🐇💨');
      } else {
        nextActionDelay = 0; // resume normal actions
        pickNextAction();
        showNotification('兔兔停下來了 🐇');
      }
      contextMenu.style.display = 'none';
    });

    document.getElementById('menu-toggle-weapon').addEventListener('click', () => {
      toggleWeapon();
      contextMenu.style.display = 'none';
    });

    // Emotion cycling via context menu
    const emotionCycleList = ['normal', 'happy', 'angry', 'sleepy', 'surprised', 'shy'];
    const emotionEmojis = { normal: '😐', happy: '😊', angry: '😤', sleepy: '😴', surprised: '😲', shy: '☺️' };
    const emotionLabels = { normal: '正常', happy: '開心', angry: '生氣', sleepy: '困', surprised: '驚訝', shy: '害羞' };
    let emotionMenuIndex = 0;
    const emotionMenuEl = document.getElementById('menu-emotion');
    emotionMenuEl.addEventListener('click', () => {
      emotionMenuIndex = (emotionMenuIndex + 1) % emotionCycleList.length;
      const e = emotionCycleList[emotionMenuIndex];
      setEmotion(e);
      emotionMenuEl.textContent = `切換表情 ${emotionEmojis[e]} (${emotionLabels[e]})`;
      contextMenu.style.display = 'none';
    });
    document.getElementById('menu-test-notify').addEventListener('click', () => {
      showNotification('這是一段測試文字 🐰🥕');
      contextMenu.style.display = 'none';
    });
    document.getElementById('menu-debug-laptop').addEventListener('click', () => {
      currentAction = 'typing';
      actionTimer = 0;
      nextActionDelay = actionDurations.typing[1]; // hold for max typing duration
      contextMenu.style.display = 'none';
    });
    document.getElementById('menu-quit').addEventListener('click', () => {
      if (!isQuitting) {
        isQuitting = true;
        quitTimer = 0;
        currentAction = 'wave';
        actionTimer = 0;
        contextMenu.style.display = 'none';
      }
    });
    window.addEventListener('click', () => {
      contextMenu.style.display = 'none';
    });

    // ── Single click: headpat detection ──
    let headpatActive = false;
    document.addEventListener('click', (e) => {
      if (headpatActive || isQuitting || isStarting) return;
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(headMesh);
      if (intersects.length > 0) {
        headpatActive = true;
        currentAction = 'headpat';
        actionTimer = 0;
        nextActionDelay = 2;
        avatar.blushL.visible = true;
        avatar.blushR.visible = true;
        setTimeout(() => {
          headpatActive = false;
          avatar.blushL.visible = false;
          avatar.blushR.visible = false;
          pickNextAction();
        }, 2000);
      }
    });

    // ── Dark mode toggle (D key) ──
    let isDarkMode = false;
    document.addEventListener('keydown', (e) => {
      if (e.key === 'd' || e.key === 'D') {
        isDarkMode = !isDarkMode;
        const newTexture = isDarkMode ? createDarkSkinTexture() : createSkinTexture();
        avatarMaterial.map = newTexture;
        avatarMaterial.needsUpdate = true;
      }
    });

    // ── Notification bubble ──
    const bubbleEl = document.getElementById('notification-bubble');
    let bubbleTimeout = null;

    function showNotification(text, triggerWave = true) {
      bubbleEl.textContent = text || '📩 新訊息！';
      bubbleEl.style.display = 'block';
      bubbleEl.style.opacity = '1';
      // Trigger wave (skip if headpat is active to not interrupt it)
      if (triggerWave && currentAction !== 'headpat') {
        currentAction = 'wave';
        actionTimer = 0;
        nextActionDelay = 3;
      }
      // Reset random-bubble timer so messages don't pile up
      randomBubbleTimer = 30 + Math.random() * 30;
      if (bubbleTimeout) clearTimeout(bubbleTimeout);
      bubbleTimeout = setTimeout(() => {
        bubbleEl.style.opacity = '0';
        setTimeout(() => { bubbleEl.style.display = 'none'; }, 500);
      }, 3000);
    }
    window.showNotification = showNotification;

    document.addEventListener('openclaw-message', (e) => {
      showNotification(e.detail?.text);
    });

    // ── Animation Loop ──
    const clock = new THREE.Clock();
    const lp = (cur, tgt, spd, dt) => cur + (tgt - cur) * Math.min(spd * dt, 1);

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);
      animTime += delta;
      actionTimer += delta;

      if (!isQuitting && !isStarting && actionTimer > nextActionDelay && currentAction !== 'jump' && currentAction !== 'sneeze') {
        if (isRoaming) {
          // Force run animation while roaming
          currentAction = 'run';
          actionTimer = 0;
          nextActionDelay = 999;
        } else {
          pickNextAction();
        }
      }

      // ── Auto emotion: update when action changes ──
      if (!isStarting && !isQuitting && currentAction !== lastActionForEmotion) {
        lastActionForEmotion = currentAction;
        const emotionForAction = {
          sleep: 'sleepy', dance: 'happy', headpat: 'shy', sneeze: 'surprised',
          eat: 'happy', run: 'happy', wave: 'happy', jump: 'surprised',
          spin: 'happy', nod: 'happy', idle: 'normal', sit: 'normal',
          look: 'normal', stretch: 'normal', typing: 'focused',
        };
        const autoEmotion = emotionForAction[currentAction] || 'normal';
        if (autoEmotion !== currentEmotion) setEmotion(autoEmotion);
      }

      // ── Random chat bubbles (30-60 sec, skip during sleep/start/quit) ──
      if (!isStarting && !isQuitting) {
        randomBubbleTimer -= delta;
        if (randomBubbleTimer <= 0 && currentAction !== 'sleep' && currentAction !== 'headpat') {
          const line = randomLines[Math.floor(Math.random() * randomLines.length)];
          showNotification(line);
          // randomBubbleTimer is reset inside showNotification
        }

        // ── Time-aware notifications ──
        timeNotifyTimer -= delta;
        if (timeNotifyTimer <= 0) {
          timeNotifyTimer = 90 + Math.random() * 90; // next check in 1.5-3 min
          const h = new Date().getHours();
          if (h >= 6 && h < 9) {
            showNotification('早安大小姐！☀️ 今天也要元氣滿滿喔！');
          } else if ((h >= 23 || h < 2) && currentAction !== 'sleep') {
            const lateLines = ['大小姐該睡覺了！💤', '這麼晚了還不睡嗎？😴', '要早點休息喔～💤'];
            showNotification(lateLines[Math.floor(Math.random() * lateLines.length)]);
          } else if (h >= 2 && h < 6 && currentAction !== 'sleep') {
            showNotification('zzz... 兔兔在睡覺嘍...💤');
          } else if (h >= 12 && h < 13) {
            showNotification('午安大小姐！🍱 吃飯了嗎？');
          }
        }
      }

      // Roaming: move window around screen
      updateRoam(delta);

      // Bounce physics
      if (!isStarting && currentAction === 'jump' && actionTimer < 0.01) bounceVel = 5;
      if (bounceVel !== 0 || bounceY > 0) {
        bounceVel -= 12 * delta;
        bounceY += bounceVel * delta;
        if (bounceY <= 0) { bounceY = 0; bounceVel = 0; }
      }
      if (!isQuitting && !isStarting) {
        avatar.position.y = 0.75 + bounceY;

        // Shadow
        const ss = 1 - bounceY * 0.15;
        shadowPlane.scale.set(ss, ss, 1);
        shadowPlane.material.opacity = 0.15 * ss;
      }

      const a = avatar;
      switch (currentAction) {
        case 'idle':
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0, 5, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 5, delta);
          a.rightArm.rotation.z = Math.sin(animTime*1.5)*0.04;
          a.leftArm.rotation.z = -Math.sin(animTime*1.5)*0.04;

          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);

        case 'wave':
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -2.5, 8, delta);

          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 5, delta);
          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0, 5, delta);

        case 'jump':

        case 'spin':
          spinAngle += delta*6;

        case 'look':
          a.head.rotation.y = Math.sin(animTime*1.5)*0.6;

        case 'dance': {
          const b = animTime*6;

          a.leftEar.rotation.z=-0.12-Math.sin(b*1.5)*0.15;

          a.twinTailR.rotation.x=0.15-Math.sin(b)*0.25;

        case 'sit': {

          a.twinTailL.rotation.x = 0.15+Math.sin(animTime*1.2)*0.03;
          a.twinTailR.rotation.x = 0.15+Math.sin(animTime*1.2+0.3)*0.03;
          a.rotation.y = lp(a.rotation.y, 0, 2, delta);

        }

        case 'sleep': {
          // Sitting doze off: sit down, head droops, breathing
          a.position.y = lp(a.position.y, 0.3, 3, delta);

          a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, -1.4, 3, delta);
          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, -1.4, 3, delta);
          // Arms resting on lap
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -0.5, 3, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, -0.5, 3, delta);
          a.rightArm.rotation.z = lp(a.rightArm.rotation.z, -0.1, 3, delta);
          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0.1, 3, delta);
          // Head drooping forward + tilted to side
          const breathSlow = Math.sin(animTime * 1.2);
          a.head.position.y = 1.75;
          a.head.rotation.x = lp(a.head.rotation.x, 0.3 + breathSlow * 0.04, 2, delta);
          a.head.rotation.z = lp(a.head.rotation.z, 0.2 + breathSlow * 0.03, 2, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 2, delta);
          // Ears droop down
          a.rightEar.rotation.z = lp(a.rightEar.rotation.z, 0.6, 2, delta);
          a.leftEar.rotation.z = lp(a.leftEar.rotation.z, -0.6, 2, delta);
          // Gentle breathing sway on twin tails
          a.twinTailL.rotation.x = 0.15 + breathSlow * 0.03;
          a.twinTailR.rotation.x = 0.15 + breathSlow * 0.03;
          a.twinTailL.rotation.z = lp(a.twinTailL.rotation.z, 0.05, 2, delta);
          a.twinTailR.rotation.z = lp(a.twinTailR.rotation.z, -0.05, 2, delta);
          a.rotation.y = lp(a.rotation.y, 0, 2, delta);
          // Shadow breathe
          shadowPlane.material.opacity = 0.12 + breathSlow * 0.03;
          break;
        }

        case 'run': {
          // Run in place
          const r = animTime * 12;
          a.rightArm.rotation.x = Math.sin(r)*1.2;
          a.leftArm.rotation.x = -Math.sin(r)*1.2;
          a.rightArm.rotation.z = -0.1;
          a.leftArm.rotation.z = 0.1;
          a.rightLeg.rotation.x = -Math.sin(r)*1.0;
          a.leftLeg.rotation.x = Math.sin(r)*1.0;
          // Bounce up and down
          a.position.y = 0.75 + Math.abs(Math.sin(r))*0.12;
          a.head.position.y = 1.75 + Math.abs(Math.sin(r))*0.06;
          a.head.rotation.z = lp(a.head.rotation.z, 0, 5, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 3, delta);
          a.head.rotation.x = lp(a.head.rotation.x, -0.1, 3, delta); // lean forward
          // Ears flap
          a.rightEar.rotation.z = 0.12 + Math.sin(r*1.5)*0.2;
          a.leftEar.rotation.z = -0.12 - Math.sin(r*1.5)*0.2;
          // Twin tails bounce
          a.twinTailL.rotation.x = 0.15 + Math.sin(r)*0.35;
          a.twinTailR.rotation.x = 0.15 - Math.sin(r)*0.35;
          a.twinTailL.rotation.z = Math.sin(r*0.8)*0.2;
          a.twinTailR.rotation.z = -Math.sin(r*0.8)*0.2;

          a.rotation.y = lp(a.rotation.y, 0, 3, delta);

        }

        case 'stretch': {
          // Morning stretch: arms up, then down
          const phase = Math.min(actionTimer / 2, 1); // 0→1 over 2 seconds
          const up = phase < 0.5 ? phase * 2 : 2 - phase * 2; // up then down
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -2.8 * up, 5, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, -2.8 * up, 5, delta);
          a.rightArm.rotation.z = lp(a.rightArm.rotation.z, -0.4 * up, 5, delta);
          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0.4 * up, 5, delta);

          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);

          a.position.y = 0.75 + up * 0.15;
          a.head.position.y = 1.75 + up * 0.05;
          a.head.rotation.x = lp(a.head.rotation.x, -0.2 * up, 3, delta); // look up
          a.head.rotation.z = lp(a.head.rotation.z, 0, 3, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 3, delta);
          a.rightEar.rotation.z = 0.12 + up * 0.15;
          a.leftEar.rotation.z = -0.12 - up * 0.15;
          a.twinTailL.rotation.x = 0.15 - up * 0.2;
          a.twinTailR.rotation.x = 0.15 - up * 0.2;

        case 'sneeze': {

            const buildup = t / 0.8;
            a.head.rotation.x = lp(a.head.rotation.x, -0.3 * buildup, 8, delta);
            a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -0.3 * buildup, 5, delta);
            a.leftArm.rotation.x = lp(a.leftArm.rotation.x, -0.3 * buildup, 5, delta);
            a.rightEar.rotation.z = 0.12 + buildup * 0.2;
            a.leftEar.rotation.z = -0.12 - buildup * 0.2;
          } else if (t < 1.0) {

            a.head.rotation.x = lp(a.head.rotation.x, 0.5, 20, delta);
            a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0.3, 15, delta);
            a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0.3, 15, delta);

            a.leftEar.rotation.z = -0.5;

            a.head.rotation.x = lp(a.head.rotation.x, 0, 3, delta);
            a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0, 3, delta);
            a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 3, delta);

            a.rightEar.rotation.z = lp(a.rightEar.rotation.z, 0.12, 3, delta);
            a.leftEar.rotation.z = lp(a.leftEar.rotation.z, -0.12, 3, delta);

          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0, 3, delta);
          a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, 0, 5, delta);
          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);
          a.head.rotation.z = lp(a.head.rotation.z, 0, 3, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 3, delta);
          a.head.position.y = 1.75;
          a.rotation.y = lp(a.rotation.y, 0, 2, delta);

        case 'nod': {
          // Enthusiastic nodding
          a.head.rotation.x = Math.sin(animTime*6)*0.25;
          a.head.rotation.z = lp(a.head.rotation.z, 0, 5, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 3, delta);

          a.twinTailL.rotation.z = Math.sin(animTime*3)*0.03;
          a.twinTailR.rotation.z = -Math.sin(animTime*3)*0.03;
          a.rotation.y = lp(a.rotation.y, 0, 2, delta);

        }

        case 'eat': {
          // Right arm raises carrot to mouth, head tilts down
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -1.8, 5, delta);
          a.rightArm.rotation.z = lp(a.rightArm.rotation.z, -0.2, 5, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 5, delta);
          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0, 5, delta);
          a.head.rotation.x = lp(a.head.rotation.x, 0.15, 4, delta);

          a.head.position.y = 1.75 + Math.sin(animTime*8)*0.015;
          a.head.rotation.z = lp(a.head.rotation.z, 0, 3, delta);
          a.head.rotation.y = lp(a.head.rotation.y, -0.1, 3, delta);
          a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, 0, 5, delta);
          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);
          a.rightEar.rotation.z = 0.12 + Math.sin(animTime*4)*0.06;
          a.leftEar.rotation.z = -0.12 - Math.sin(animTime*4)*0.06;
          a.twinTailL.rotation.x = 0.15+Math.sin(animTime*1.5)*0.04;
          a.twinTailR.rotation.x = 0.15+Math.sin(animTime*1.5+0.5)*0.04;

          a.leftSword.visible = false;

        }

        case 'headpat': {

          a.leftEar.rotation.z = -shake;
