          a.head.rotation.x = lp(a.head.rotation.x, 0.05, 4, delta);
          a.head.rotation.y = lp(a.head.rotation.y, 0, 3, delta);
          a.head.position.y = 1.75 + Math.sin(animTime*3)*0.02;
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0, 5, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 5, delta);
          a.rightArm.rotation.z = Math.sin(animTime*2)*0.05;
          a.leftArm.rotation.z = -Math.sin(animTime*2)*0.05;
          a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, 0, 5, delta);
          a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);
          a.twinTailL.rotation.x = 0.15+Math.sin(animTime*4)*0.1;
          a.twinTailR.rotation.x = 0.15+Math.sin(animTime*4+0.5)*0.1;
          a.twinTailL.rotation.z = Math.sin(animTime*3)*0.08;
          a.twinTailR.rotation.z = -Math.sin(animTime*3)*0.08;
          a.rotation.y = lp(a.rotation.y, 0, 2, delta);
          break;
        }

        case 'typing': {
          // 身體下沉，和 sit 一樣
          a.position.y = lp(a.position.y, 0.3, 3, delta);

          // 打字速度節奏（控制左右手交替）
          const typeSpeed = animTime * 10;
          const typeAlt = Math.sin(typeSpeed) * 0.08;  // 左右手交替幅度

          // 手臂前伸到「鍵盤高度」，交替打字
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -1.0 + typeAlt, 5, delta);
          a.leftArm.rotation.x  = lp(a.leftArm.rotation.x,  -1.0 - typeAlt, 5, delta);
          // 手臂微微內收（z 軸），模擬手在鍵盤寬度
          a.rightArm.rotation.z = lp(a.rightArm.rotation.z, -0.25 + Math.sin(typeSpeed * 1.3) * 0.03, 4, delta);
          a.leftArm.rotation.z  = lp(a.leftArm.rotation.z,   0.25 - Math.sin(typeSpeed * 1.3) * 0.03, 4, delta);

          // 頭部微低頭看螢幕，偶爾慢速左右偏
          a.head.position.y = 1.75 + Math.sin(animTime * 1.8) * 0.015;
          a.head.rotation.x = lp(a.head.rotation.x, 0.2 + Math.sin(animTime * 3) * 0.03, 3, delta);
          a.head.rotation.y = lp(a.head.rotation.y, Math.sin(animTime * 0.6) * 0.15, 2, delta);
          a.head.rotation.z = Math.sin(animTime * 1.5) * 0.03;

          // 腿保持靜止（坐姿）
          a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, -1.4, 4, delta);
          a.leftLeg.rotation.x  = lp(a.leftLeg.rotation.x, -1.4, 4, delta);

          // 耳朵輕微隨打字節奏顫動
          a.rightEar.rotation.z = 0.12 + Math.sin(typeSpeed * 0.5) * 0.04;
          a.leftEar.rotation.z  = -0.12 - Math.sin(typeSpeed * 0.5) * 0.04;

          // 雙馬尾幾乎靜止
          a.twinTailL.rotation.x = 0.15 + Math.sin(animTime * 1.2) * 0.03;
          a.twinTailR.rotation.x = 0.15 + Math.sin(animTime * 1.2 + 0.3) * 0.03;

          // 側身 90°，兔兔面向 -x，讓筆電從側面可見
          a.rotation.y = lp(a.rotation.y, -Math.PI / 2, 2, delta);

          // 筆電移到兔兔左前方（-x 方向），鍵盤朝向 +x（朝兔兔）
          laptop.position.x = lp(laptop.position.x, -1.0, 3, delta);
          laptop.position.z = lp(laptop.position.z, 0, 3, delta);
          laptop.rotation.y = Math.PI / 2;

          // 隱藏武器
          a.leftCarrot.visible = false;
          a.leftSword.visible = false;
          break;
        }
      }

      // Weapon visibility: hide eat carrot when not eating, show current weapon
      if (currentAction !== 'eat' && currentAction !== 'typing') {
        a.eatCarrot.visible = false;
        a.leftCarrot.visible = currentWeapon === 'carrot';
        a.leftSword.visible = currentWeapon === 'sword';
      }

      // Laptop: show only while typing
      laptop.visible = (currentAction === 'typing') && !isStarting && !isQuitting;

      // Reset body rotation
      if (!isQuitting) a.rotation.x = lp(a.rotation.x, 0, 3, delta);
      // Reset position for non-sit/sleep/run/stretch actions
      if (!isQuitting && !['sit','sleep','run','stretch','sneeze','eat','headpat','typing'].includes(currentAction)) {
        if (bounceY === 0) a.position.y = lp(a.position.y, 0.75, 3, delta);
      }

      // ── Rabbit eye blink animation ──
      {
        const blinkCycle = animTime % (4.2 + Math.sin(animTime * 0.5) * 1.5);
        let blinkClose = 0;
        if (blinkCycle < 0.2) {
          blinkClose = Math.sin((blinkCycle / 0.2) * Math.PI);
        }
        const shouldBlink = !isStarting && !isQuitting && currentAction !== 'sleep';
        avatar.eyelidL.scale.set(1, shouldBlink ? blinkClose : 0, 1);
        avatar.eyelidR.scale.set(1, shouldBlink ? blinkClose : 0, 1);
      }

      // ── Pucci expressive animation ──
      {
        const p = pucci;
        const baseEyeY = 0.7, baseEyeLX = -0.16, baseEyeRX = 0.16;

        // Defaults
        let eyeScaleX = 1, eyeScaleY = 1;
        let eyeOffsetX = 0, eyeOffsetY = 0;
        let mouthScaleX = 1, mouthScaleY = 1;
        let bodyTilt = Math.sin(animTime * 1.8) * 0.04;
        let bodyNod = 0;
        let posY = Math.sin(animTime * 2.5) * 0.04;
        let armLY = 0.45 + Math.sin(animTime * 2) * 0.03;
        let armRY = 0.45 + Math.sin(animTime * 2 + 1) * 0.03;
        let legLY = 0.02 + Math.sin(animTime * 3) * 0.015;
        let legRY = 0.02 + Math.sin(animTime * 3 + Math.PI) * 0.015;

        // Blink: flatten eyes periodically
        const blinkCycle = animTime % (3.5 + Math.sin(animTime * 0.7) * 1.2);
        if (blinkCycle < 0.1) { eyeScaleY = 0.2; }

        // Look toward bunny sometimes
        const lookCycle = Math.sin(animTime * 0.5);
        let targetRotY = lookCycle > 0.3 ? -0.4 : (lookCycle < -0.3 ? 0.2 : 0);

        // React to bunny's actions
        if (currentAction === 'jump') {
          posY = Math.abs(Math.sin(animTime * 8)) * 0.18;
          bodyTilt = Math.sin(animTime * 8) * 0.12;
          eyeScaleX = 1.3; eyeScaleY = 1.3; // wide eyes
          mouthScaleX = 1.1; mouthScaleY = 1.2;
          armLY = 0.45 + Math.sin(animTime * 10) * 0.08;
          armRY = 0.45 + Math.sin(animTime * 10 + 2) * 0.08;
          targetRotY = -0.3;
        } else if (currentAction === 'dance') {
          posY = Math.abs(Math.sin(animTime * 6)) * 0.1;
          bodyTilt = Math.sin(animTime * 6) * 0.15;
          eyeOffsetX = Math.sin(animTime * 6) * 0.02;
          mouthScaleY = 1.15;
          armLY = 0.45 + Math.sin(animTime * 6) * 0.06;
          armRY = 0.45 - Math.sin(animTime * 6) * 0.06;
          legLY = 0.02 + Math.sin(animTime * 6) * 0.04;
          legRY = 0.02 - Math.sin(animTime * 6) * 0.04;
          targetRotY = Math.sin(animTime * 3) * 0.5;
        } else if (currentAction === 'sleep') {
          posY = -0.03;
          bodyTilt = 0.12 + Math.sin(animTime * 1.2) * 0.025;
          eyeScaleY = 0.15; // eyes nearly shut
          eyeOffsetY = -0.02;
          mouthScaleX = 0.7; mouthScaleY = 0.5;
          armLY = 0.45 + Math.sin(animTime * 1.2) * 0.01;
          armRY = armLY;
          targetRotY = -0.25;
        } else if (currentAction === 'wave') {
          posY = Math.abs(Math.sin(animTime * 5)) * 0.08;
          eyeOffsetX = -0.015;
          mouthScaleY = 1.2;
          armRY = 0.45 + Math.sin(animTime * 8) * 0.07;
          targetRotY = -0.5;
        } else if (currentAction === 'spin') {
          eyeOffsetX = Math.sin(animTime * 8) * 0.025;
          eyeOffsetY = Math.cos(animTime * 8) * 0.025;
          bodyTilt = Math.sin(animTime * 4) * 0.08;
          mouthScaleY = 1.1;
        } else if (currentAction === 'sneeze') {
          if (actionTimer > 0.8 && actionTimer < 1.2) {
            posY = 0.12;
            bodyTilt = -0.15;
            eyeScaleX = 1.4; eyeScaleY = 1.4;
            mouthScaleX = 1.2; mouthScaleY = 1.4;
          }
        } else if (currentAction === 'nod') {
          bodyNod = Math.sin(animTime * 6) * 0.08;
          eyeOffsetY = Math.sin(animTime * 6) * 0.015;
          mouthScaleY = 1.08;
        } else if (currentAction === 'stretch') {
          const phase = Math.min(actionTimer / 2, 1);
          const up = phase < 0.5 ? phase * 2 : 2 - phase * 2;
          mouthScaleX = 1 + up * 0.3; mouthScaleY = 1 + up * 0.5;
          eyeScaleY = 1 - up * 0.5; // squint
          posY = up * 0.05;
        } else if (currentAction === 'eat') {
          // Watch bunny eat, slightly jealous
          eyeOffsetX = -0.02;
          eyeOffsetY = -0.01;
          mouthScaleX = 0.8; mouthScaleY = 0.7;
          bodyTilt = Math.sin(animTime * 1.5) * 0.03;
          targetRotY = -0.45;
        } else if (currentAction === 'headpat') {
          // Happy watching headpat
          posY = Math.abs(Math.sin(animTime * 6)) * 0.06;
          bodyTilt = Math.sin(animTime * 4) * 0.08;
          eyeScaleX = 1.2; eyeScaleY = 0.8; // happy squint
          mouthScaleY = 1.15;
          targetRotY = -0.4;
        } else if (currentAction === 'sit') {
          posY = -0.02;
          bodyTilt = Math.sin(animTime * 1.5) * 0.03;
          eyeOffsetX = Math.sin(animTime * 0.7) * 0.015;
          mouthScaleX = 0.9; mouthScaleY = 0.85;
          targetRotY = -0.3;
        } else if (currentAction === 'run') {
          const r = animTime * 10;
          posY = Math.abs(Math.sin(r)) * 0.1;
          bodyTilt = Math.sin(r * 0.5) * 0.1;
          eyeOffsetY = 0.01;
          armLY = 0.45 + Math.sin(r) * 0.06;
          armRY = 0.45 - Math.sin(r) * 0.06;
          legLY = 0.02 + Math.sin(r) * 0.04;
          legRY = 0.02 - Math.sin(r) * 0.04;
        } else if (currentAction === 'typing') {
          // Pucci watches from the right side while bunny types on the left
          bodyTilt = Math.sin(animTime * 1.5) * 0.03;
          targetRotY = -0.6; // turn to look left toward bunny+laptop
          eyeOffsetX = -0.015;
          mouthScaleX = 0.9; mouthScaleY = 0.85;
        }

        // Apply (skip during quit sink phases — quit handles Pucci directly)
        const quitPhase2Start = QUIT_WAVE_DURATION;
        if (!isQuitting || quitTimer < quitPhase2Start) {
          p.position.y = posY;
          // Drift back to home position when not doing a special move
          p.position.x = lp(p.position.x, 1.1, 1.5, delta);
          p.position.z = lp(p.position.z, 0.3, 1.5, delta);
          p.bodyMesh.rotation.z = bodyTilt;
          p.bodyMesh.rotation.x = bodyNod;
          p.leftEye.position.set(baseEyeLX + eyeOffsetX, baseEyeY + eyeOffsetY, 0.39);
          p.rightEye.position.set(baseEyeRX + eyeOffsetX, baseEyeY + eyeOffsetY, 0.39);
          p.leftEye.scale.set(eyeScaleX, eyeScaleY, 1);
          p.rightEye.scale.set(eyeScaleX, eyeScaleY, 1);
          p.mouthOuter.scale.set(mouthScaleX, mouthScaleY, 1);
          p.mouthInner.scale.set(mouthScaleX, mouthScaleY, 1);
          p.leftArm.position.y = armLY;
          p.rightArm.position.y = armRY;
          p.leftLeg.position.y = legLY;
          p.rightLeg.position.y = legRY;
          p.rotation.y += (targetRotY - p.rotation.y) * 2.5 * delta;
        } else if (isQuitting) {
          // During quit: wide-eyed scared expression
          p.leftEye.scale.set(1.4, 1.4, 1);
          p.rightEye.scale.set(1.4, 1.4, 1);
          p.mouthOuter.scale.set(1.2, 1.5, 1);
          p.mouthInner.scale.set(1.2, 1.5, 1);
        }

        // Update pucci shadow
        if (!isQuitting) {
          pucciShadow.position.x = p.position.x;
          pucciShadow.position.z = p.position.z;
          const ps = 1 - Math.max(0, p.position.y) * 0.3;
          pucciShadow.scale.set(ps, ps, 1);
          pucciShadow.material.opacity = 0.12 * ps;
        }
      }

      // ── Startup animation sequence ──
      if (isStarting) {
        startTimer += delta;

        const s1End = START_LOGO_DURATION;
        const s2End = s1End + START_LOGO_FADE_DURATION;
        const s3End = s2End + START_HOLE_OPEN_DURATION;
        const s4End = s3End + START_RABBIT_JUMP_DURATION;
        const s5End = s4End + START_PUCCI_JUMP_DURATION;
        const s6End = s5End + START_HOLE_CLOSE_DURATION;

        const logo = nzxtLogo;
        const mats = logo.userData;

        if (startTimer < s1End) {
          // ── Phase 1: NZXT Logo appears ──
          // Small delay before showing to avoid first-frame artifacts
          if (startTimer < 0.05) {
            logo.visible = false;
          } else {
            logo.visible = true;
            const fadeP = Math.min((startTimer - 0.05) / 0.8, 1); // fade in over 0.8s
            const easeOut = 1 - Math.pow(1 - fadeP, 3);

            // Smooth fade in (no oscillation during fade)
            mats.frontMat.opacity = easeOut;
            mats.sideMat.opacity = easeOut;

            // Glow: only pulse after fully faded in
            const glowBase = easeOut * 0.6;
            const glowPulse = fadeP >= 1 ? Math.sin(startTimer * 3) * 0.1 : 0;
            mats.glowMat.opacity = glowBase + glowPulse;

            // Scale: smooth ease-out with slight overshoot
            const scaleT = Math.min(easeOut * 1.05, 1);
            logo.scale.set(scaleT, scaleT, scaleT);

            // Gentle floating and rotation
            logo.position.y = 2.5 + Math.sin(startTimer * 1.5) * 0.08;
            logo.rotation.y = Math.sin(startTimer * 0.8) * 0.06;
          }

        } else if (startTimer < s2End) {
          // ── Phase 2: Logo fades out, prepare for hole ──
          const p = (startTimer - s1End) / START_LOGO_FADE_DURATION;
          const fadeOut = 1 - p * p; // ease-in fade

          mats.frontMat.opacity = fadeOut;
          mats.sideMat.opacity = fadeOut;
          mats.glowMat.opacity = fadeOut * 0.5;

          // Logo rises and shrinks
          logo.position.y = 2.5 + p * 1.0;
          const shrink = 1 - p * 0.3;
          logo.scale.set(shrink, shrink, shrink);

        } else if (startTimer < s3End) {
          // ── Phase 3: Hole opens on ground ──
          logo.visible = false;
          const p = (startTimer - s2End) / START_HOLE_OPEN_DURATION;
          const easeOut = 1 - Math.pow(1 - p, 3);

          holePlane.visible = true;
          holeRim.visible = true;
          const holeScale = easeOut * 1.5;
          holePlane.scale.set(holeScale, holeScale, 1);
          holeRim.scale.set(holeScale, holeScale, 1);
          holeRimMat.opacity = 0.3 + Math.sin(startTimer * 10) * 0.15;

        } else if (startTimer < s4End) {
          // ── Phase 4: Rabbit jumps out of hole! ──
          const p = (startTimer - s3End) / START_RABBIT_JUMP_DURATION;
          avatar.visible = true;

          // Keep hole open + pulsing
          holePlane.scale.set(1.5, 1.5, 1);
          holeRim.scale.set(1.5, 1.5, 1);
          holeRimMat.opacity = 0.4 + Math.sin(startTimer * 12) * 0.15;

          if (p < 0.5) {
            // Rising from hole
            const riseP = p / 0.5;
            const easeOut = 1 - Math.pow(1 - riseP, 2);
            avatar.position.y = -2.5 + easeOut * 3.25; // -2.5 → 0.75
            // Spinning while rising
            avatar.rotation.y += delta * 5;
            // Scale grows
            const s = 0.6 + easeOut * 0.4;
            avatar.scale.set(s, s, s);
            // Arms up
            a.rightArm.rotation.x = -2.5 + easeOut * 2.0;
            a.leftArm.rotation.x = -2.5 + easeOut * 2.0;
            a.rightArm.rotation.z = -0.5 + Math.sin(startTimer * 10) * 0.3;
            a.leftArm.rotation.z = 0.5 - Math.sin(startTimer * 10) * 0.3;
            // Legs kicking
            a.rightLeg.rotation.x = Math.sin(startTimer * 12) * 0.6;
            a.leftLeg.rotation.x = Math.sin(startTimer * 12 + 1.5) * 0.6;
            // Ears flapping
            a.rightEar.rotation.z = Math.sin(startTimer * 14) * 0.4;
            a.leftEar.rotation.z = -Math.sin(startTimer * 14) * 0.4;
            // Twin tails whip
            a.twinTailL.rotation.x = 0.15 + Math.sin(startTimer * 10) * 0.4;
            a.twinTailR.rotation.x = 0.15 - Math.sin(startTimer * 10) * 0.4;
          } else {
            // Landing bounce
            const landP = (p - 0.5) / 0.5;
            const bounce = Math.sin(landP * Math.PI) * 0.3 * (1 - landP);
            avatar.position.y = 0.75 + bounce;
            // Face forward
            avatar.rotation.y = lp(avatar.rotation.y, 0, 4, delta);
            avatar.scale.set(1, 1, 1);
            // Arms settle
            a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0, 6, delta);
            a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 6, delta);
            a.rightArm.rotation.z = lp(a.rightArm.rotation.z, 0, 5, delta);
            a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0, 5, delta);
            a.rightLeg.rotation.x = lp(a.rightLeg.rotation.x, 0, 5, delta);
            a.leftLeg.rotation.x = lp(a.leftLeg.rotation.x, 0, 5, delta);
            // Ears settle
            a.rightEar.rotation.z = lp(a.rightEar.rotation.z, 0.12, 5, delta);
            a.leftEar.rotation.z = lp(a.leftEar.rotation.z, -0.12, 5, delta);
            a.twinTailL.rotation.x = lp(a.twinTailL.rotation.x, 0.15, 4, delta);
            a.twinTailR.rotation.x = lp(a.twinTailR.rotation.x, 0.15, 4, delta);
            // Head happy
            a.head.rotation.z = Math.sin(startTimer * 6) * 0.1 * (1 - landP);
            a.head.rotation.x = lp(a.head.rotation.x, 0, 4, delta);
            a.head.rotation.y = lp(a.head.rotation.y, 0, 4, delta);
            a.head.position.y = 1.75;
          }

        } else if (startTimer < s5End) {
          // ── Phase 5: Pucci pops out! ──
          const p = (startTimer - s4End) / START_PUCCI_JUMP_DURATION;
          pucci.visible = true;

          // Hole still open but starting to shrink
          const holeScale = 1.5 - p * 0.3;
          holePlane.scale.set(holeScale, holeScale, 1);
          holeRim.scale.set(holeScale, holeScale, 1);
          holeRimMat.opacity = (0.4 - p * 0.2) + Math.sin(startTimer * 10) * 0.1;

          // Keep rabbit settled
          avatar.position.y = 0.75;
          avatar.rotation.y = lp(avatar.rotation.y, 0, 3, delta);
          // Rabbit watches pucci - turns to look
          a.head.rotation.y = lp(a.head.rotation.y, 0.3, 4, delta);
          // Idle breathing
          a.head.position.y = 1.75 + Math.sin(animTime * 2) * 0.025;
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, 0, 5, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, 0, 5, delta);

          if (p < 0.5) {
            // Pucci rising from hole
            const riseP = p / 0.5;
            const easeOut = 1 - Math.pow(1 - riseP, 2);
            pucci.position.y = -2.5 + easeOut * 2.5; // rises to 0
            pucci.position.x = lp(pucci.position.x, 1.1, 4, delta);
            pucci.position.z = lp(pucci.position.z, 0.3, 4, delta);
            // Spin while rising
            pucci.rotation.y += delta * 6;
            const ps = 0.55 * (0.5 + easeOut * 0.5);
            pucci.scale.set(ps, ps, ps);
            // Excited eyes
            pucci.leftEye.scale.set(1.3, 1.3, 1);
            pucci.rightEye.scale.set(1.3, 1.3, 1);
            pucci.mouthOuter.scale.set(1.1, 1.3, 1);
            pucci.mouthInner.scale.set(1.1, 1.3, 1);
          } else {
            // Pucci landing bounce
            const landP = (p - 0.5) / 0.5;
            const bounce = Math.sin(landP * Math.PI) * 0.2 * (1 - landP);
            pucci.position.y = bounce;
            pucci.position.x = lp(pucci.position.x, 1.1, 4, delta);
            pucci.position.z = lp(pucci.position.z, 0.3, 4, delta);
            pucci.rotation.y = lp(pucci.rotation.y, 0, 4, delta);
            pucci.scale.set(0.55, 0.55, 0.55);
            pucci.rotation.x = lp(pucci.rotation.x, 0, 4, delta);
            // Happy expression settling
            const settle = 1 - landP;
            pucci.leftEye.scale.set(1 + settle * 0.2, 1 + settle * 0.2, 1);
            pucci.rightEye.scale.set(1 + settle * 0.2, 1 + settle * 0.2, 1);
            pucci.mouthOuter.scale.set(1, 1 + settle * 0.15, 1);
            pucci.mouthInner.scale.set(1, 1 + settle * 0.15, 1);
            pucci.bodyMesh.rotation.z = Math.sin(startTimer * 6) * 0.06 * settle;
          }

        } else if (startTimer < s6End) {
          // ── Phase 6: Hole closes ──
          const p = (startTimer - s5End) / START_HOLE_CLOSE_DURATION;
          const elastic = 1 - Math.pow(1 - p, 2);
          const closeScale = 1.2 * (1 - elastic);
          holePlane.scale.set(closeScale, closeScale, 1);
          holeRim.scale.set(closeScale * 1.1, closeScale * 1.1, 1);
          holeRimMat.opacity = 0.3 * (1 - elastic);

          // Characters settle
          avatar.position.y = 0.75;
          pucci.position.y = lp(pucci.position.y, 0, 5, delta);
          pucci.position.x = lp(pucci.position.x, 1.1, 3, delta);

          // Show shadows fading in
          shadowPlane.visible = true;
          pucciShadow.visible = true;
          shadowPlane.material.opacity = 0.15 * elastic;
          pucciShadow.material.opacity = 0.12 * elastic;

        } else {
          // ── Startup complete! Enter idle state ──
          isStarting = false;
          holePlane.visible = false;
          holeRim.visible = false;
          holePlane.scale.set(0, 0, 0);
          holeRim.scale.set(0, 0, 0);
          nzxtLogo.visible = false;

          // Reset to idle
          avatar.position.y = 0.75;
          avatar.scale.set(1, 1, 1);
          avatar.rotation.y = 0;
          pucci.position.set(1.1, 0, 0.3);
          pucci.scale.set(0.55, 0.55, 0.55);
          pucci.rotation.set(0, 0, 0);

          // Show shadows
          shadowPlane.visible = true;
          pucciShadow.visible = true;
          shadowPlane.material.opacity = 0.15;
          pucciShadow.material.opacity = 0.12;

          currentAction = 'idle';
          actionTimer = 0;
          nextActionDelay = 3 + Math.random() * 4;

          // Time-based startup greeting
          {
            const startHour = new Date().getHours();
            let startGreeting = null;
            if (startHour >= 6 && startHour < 9) startGreeting = '早安大小姐！☀️ 今天也要加油喔！';
            else if (startHour >= 9 && startHour < 12) startGreeting = '大小姐早！今天也要元氣滿滿💪';
            else if (startHour >= 12 && startHour < 13) startGreeting = '午安大小姐！🍱 吃飯了嗎？';
            else if (startHour >= 13 && startHour < 17) startGreeting = '大小姐下午好！✨';
            else if (startHour >= 17 && startHour < 19) startGreeting = '大小姐辛苦了！🌅 工作到這個時間呀～';
            else if (startHour >= 19 && startHour < 23) startGreeting = '晚安大小姐！🌙 今天辛苦啦～';
            else if (startHour >= 23 || startHour < 2) startGreeting = '大小姐這麼晚還不睡嗎？💤';
            else if (startHour >= 2 && startHour < 6) startGreeting = '凌晨了...兔兔要去睡囉💤';
            if (startGreeting) setTimeout(() => showNotification(startGreeting), 1500);
          }
        }

        renderer.render(scene, camera);
        return; // Skip normal animation during startup
      }

      // ── Quit animation sequence ──
      if (isQuitting) {
        quitTimer += delta;

        const p1End = QUIT_WAVE_DURATION;
        const p2End = p1End + QUIT_SURPRISE_DURATION;
        const p3End = p2End + QUIT_HOLE_DURATION;
        const p4End = p3End + QUIT_SINK_DURATION;
        const p5End = p4End + QUIT_CLOSE_DURATION;

        if (quitTimer < p1End) {
          // ── Phase 1: Energetic wave goodbye with little hops ──
          currentAction = 'wave';
          // Add small hops while waving
          const hopCycle = Math.sin(quitTimer * 8);
          a.position.y = 0.75 + Math.abs(hopCycle) * 0.12;
          // Body sways side to side
          a.rotation.y = Math.sin(quitTimer * 3) * 0.25;
          // Head tilts playfully
          a.head.rotation.z = Math.sin(quitTimer * 4) * 0.15;
          // Ears flap excitedly
          a.rightEar.rotation.z = 0.12 + Math.sin(quitTimer * 10) * 0.25;
          a.leftEar.rotation.z = -0.12 - Math.sin(quitTimer * 10) * 0.25;
          // Twin tails bounce
          a.twinTailL.rotation.x = 0.15 + Math.sin(quitTimer * 8) * 0.3;
          a.twinTailR.rotation.x = 0.15 - Math.sin(quitTimer * 8) * 0.3;
          a.twinTailL.rotation.z = Math.sin(quitTimer * 6) * 0.15;
          a.twinTailR.rotation.z = -Math.sin(quitTimer * 6) * 0.15;
          // Pucci bounces happily watching
          pucci.position.y = Math.abs(Math.sin(quitTimer * 6)) * 0.1;
          pucci.rotation.y = lp(pucci.rotation.y, -0.5, 4, delta);
          pucci.bodyMesh.rotation.z = Math.sin(quitTimer * 5) * 0.1;

        } else if (quitTimer < p2End) {
          // ── Phase 2: Surprise! Look down as hole starts to appear ──
          const sp = (quitTimer - p1End) / QUIT_SURPRISE_DURATION;
          currentAction = 'idle'; // stop wave
          // Face forward, look down
          a.rotation.y = lp(a.rotation.y, 0, 8, delta);
          a.head.rotation.x = lp(a.head.rotation.x, 0.4, 10, delta); // look down
          a.head.rotation.z = lp(a.head.rotation.z, -0.15, 8, delta); // slight tilt
          a.head.rotation.y = lp(a.head.rotation.y, 0, 8, delta);
          a.position.y = lp(a.position.y, 0.75, 10, delta);
          // Ears perk up (surprise)
          a.rightEar.rotation.z = lp(a.rightEar.rotation.z, -0.15, 12, delta);
          a.leftEar.rotation.z = lp(a.leftEar.rotation.z, 0.15, 12, delta);
          // Arms slightly out in surprise
          a.rightArm.rotation.x = lp(a.rightArm.rotation.x, -0.4, 8, delta);
          a.leftArm.rotation.x = lp(a.leftArm.rotation.x, -0.4, 8, delta);
          a.rightArm.rotation.z = lp(a.rightArm.rotation.z, -0.5, 8, delta);
          a.leftArm.rotation.z = lp(a.leftArm.rotation.z, 0.5, 8, delta);
          // Small hole starts appearing
          holePlane.visible = true;
          holeRim.visible = true;
          const tinyScale = sp * 0.15;
          holePlane.scale.set(tinyScale, tinyScale, 1);
          holeRim.scale.set(tinyScale, tinyScale, 1);
          holeRimMat.opacity = sp * 0.4;
          // Pucci startled — jumps back
          pucci.position.y = Math.max(0, 0.2 * (1 - sp * 2));
          pucci.bodyMesh.rotation.z = lp(pucci.bodyMesh.rotation.z, -0.15, 6, delta);
          pucci.rotation.y = lp(pucci.rotation.y, -0.3, 4, delta);

        } else if (quitTimer < p3End) {
          // ── Phase 3: Hole expands with glowing rim pulse ──
          const hp = (quitTimer - p2End) / QUIT_HOLE_DURATION;
          const easeOut = 1 - Math.pow(1 - hp, 3); // ease-out cubic
          currentAction = 'idle';

          holePlane.visible = true;
          holeRim.visible = true;
          const holeScale = 0.15 + easeOut * 1.35; // 0.15 → 1.5
          holePlane.scale.set(holeScale, holeScale, 1);
          holeRim.scale.set(holeScale, holeScale, 1);

          // Pulsing glow rim
          holeRimMat.opacity = 0.3 + Math.sin(quitTimer * 12) * 0.15;

          // Fade out shadows
          shadowPlane.material.opacity = 0.15 * (1 - easeOut);
          pucciShadow.material.opacity = 0.12 * (1 - easeOut);
          if (hp > 0.7) {
            shadowPlane.visible = false;
            pucciShadow.visible = false;
          }

          // Avatar watches the hole grow — nervous fidgeting
          a.position.y = 0.75;
          a.head.rotation.x = lp(a.head.rotation.x, 0.35, 4, delta);
          a.head.rotation.z = Math.sin(quitTimer * 6) * 0.08;
          a.head.rotation.y = lp(a.head.rotation.y, 0, 4, delta);
          a.rotation.y = lp(a.rotation.y, 0, 4, delta);
          // Arms fidget
          a.rightArm.rotation.x = -0.3 + Math.sin(quitTimer * 5) * 0.15;
          a.leftArm.rotation.x = -0.3 + Math.sin(quitTimer * 5 + 1) * 0.15;
          a.rightArm.rotation.z = -0.3 + Math.sin(quitTimer * 3) * 0.1;
          a.leftArm.rotation.z = 0.3 - Math.sin(quitTimer * 3) * 0.1;
          // Nervous ear twitching
          a.rightEar.rotation.z = -0.1 + Math.sin(quitTimer * 15) * 0.12;
          a.leftEar.rotation.z = 0.1 - Math.sin(quitTimer * 15) * 0.12;
          // Legs shuffle
          a.rightLeg.rotation.x = Math.sin(quitTimer * 4) * 0.15;
          a.leftLeg.rotation.x = -Math.sin(quitTimer * 4) * 0.15;

          // Pucci backs up nervously, shaking
          pucci.position.y = 0;
          pucci.position.x = lp(pucci.position.x, 1.4, 2, delta); // scoot away
          pucci.bodyMesh.rotation.z = Math.sin(quitTimer * 12) * 0.08; // shaking
          pucci.rotation.y = lp(pucci.rotation.y, -0.6, 3, delta); // look at hole

        } else if (quitTimer < p4End) {
          // ── Phase 4: Sink into the hole! ──
          const sinkT = quitTimer - p3End;
          const sinkP = sinkT / QUIT_SINK_DURATION;
          const eased = sinkP < 0.3 ? sinkP * sinkP * 11.1 : sinkP; // fast start then linear

          // Keep hole fully open + rim pulsing faster
          holePlane.scale.set(1.5, 1.5, 1);
          holeRim.scale.set(1.5, 1.5, 1);
          holeRimMat.opacity = 0.4 + Math.sin(quitTimer * 18) * 0.2;

          // Avatar sinks: y from 0.75 → -2.5
          a.position.y = 0.75 - eased * 3.25;
          // Slow spin while sinking
          a.rotation.y += delta * 4;
          // Scale shrinks
          const avatarScale = 1 - eased * 0.4;
          a.scale.set(avatarScale, avatarScale, avatarScale);

          // Flailing arms! Frantic waving
          a.rightArm.rotation.x = -2.0 + Math.sin(quitTimer * 14) * 0.8;
          a.leftArm.rotation.x = -2.0 + Math.sin(quitTimer * 14 + 2) * 0.8;
          a.rightArm.rotation.z = -0.6 + Math.sin(quitTimer * 10) * 0.5;
          a.leftArm.rotation.z = 0.6 - Math.sin(quitTimer * 10) * 0.5;
          // Kicking legs
          a.rightLeg.rotation.x = Math.sin(quitTimer * 12) * 0.8;
          a.leftLeg.rotation.x = Math.sin(quitTimer * 12 + 1.5) * 0.8;
          // Head panic
          a.head.rotation.x = -0.2 + Math.sin(quitTimer * 8) * 0.2;
          a.head.rotation.z = Math.sin(quitTimer * 10) * 0.2;
          a.head.rotation.y = Math.sin(quitTimer * 6) * 0.3;
          a.head.position.y = 1.75;
          // Ears flapping wildly
          a.rightEar.rotation.z = Math.sin(quitTimer * 18) * 0.5;
          a.leftEar.rotation.z = -Math.sin(quitTimer * 18) * 0.5;
          // Twin tails whip around
          a.twinTailL.rotation.x = 0.15 + Math.sin(quitTimer * 12) * 0.5;
          a.twinTailR.rotation.x = 0.15 - Math.sin(quitTimer * 12) * 0.5;
          a.twinTailL.rotation.z = Math.sin(quitTimer * 10) * 0.4;
          a.twinTailR.rotation.z = -Math.sin(quitTimer * 10) * 0.4;

          // Pucci: hesitate, then jump in after avatar
          const pucciSinkStart = QUIT_PUCCI_HESITATE;
          if (sinkT < pucciSinkStart) {
            // Pucci panics on the edge — bouncing and looking down
            pucci.position.y = Math.abs(Math.sin(quitTimer * 16)) * 0.15;
            pucci.position.x = lp(pucci.position.x, 0.6, 4, delta); // move closer to hole
            pucci.bodyMesh.rotation.z = Math.sin(quitTimer * 14) * 0.15;
            pucci.rotation.y = lp(pucci.rotation.y, 0, 6, delta); // look at hole
            pucci.rotation.x = lp(pucci.rotation.x, 0.25, 6, delta); // lean forward/look down
          } else {
            // Pucci takes the plunge!
            const pucciP = (sinkT - pucciSinkStart) / (QUIT_SINK_DURATION - pucciSinkStart);
            const pucciEased = pucciP * pucciP * pucciP; // cubic ease-in (accelerating fall)
            pucci.position.y = -pucciEased * 3.5;
            pucci.position.x = lp(pucci.position.x, 0.4, 6, delta); // move toward center
            const pucciScale = 0.55 * (1 - pucciEased * 0.5);
            pucci.scale.set(pucciScale, pucciScale, pucciScale);
            // Pucci spins while falling
            pucci.rotation.y += delta * 6;
            pucci.rotation.x = lp(pucci.rotation.x, 0.4, 4, delta);
            // Arms/legs flail
            pucci.leftArm.position.y = 0.45 + Math.sin(quitTimer * 16) * 0.1;
            pucci.rightArm.position.y = 0.45 + Math.sin(quitTimer * 16 + 2) * 0.1;
            pucci.leftLeg.position.y = 0.02 + Math.sin(quitTimer * 14) * 0.06;
            pucci.rightLeg.position.y = 0.02 + Math.sin(quitTimer * 14 + 1.5) * 0.06;
          }

        } else if (quitTimer < p5End) {
          // ── Phase 5: Hole closes with bounce ──
          a.position.y = -4;
          pucci.position.y = -4;
          const closeP = (quitTimer - p4End) / QUIT_CLOSE_DURATION;
          // Elastic close: overshoot then settle
          const elastic = 1 - Math.pow(1 - closeP, 2);
          const closeScale = 1.5 * (1 - elastic);
          holePlane.scale.set(closeScale, closeScale, 1);
          holeRim.scale.set(closeScale * 1.1, closeScale * 1.1, 1);
          holeRimMat.opacity = 0.5 * (1 - elastic);
        } else {
          // ── Done: close window ──
          holePlane.visible = false;
          holeRim.visible = false;
          if (window.__TAURI__) {
            window.__TAURI__.window.getCurrentWindow().close();
          }
        }
      }

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
